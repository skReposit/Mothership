<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCLAW Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
        }

        .content {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 20px;
            overflow: hidden;
        }

        .widget-card {
            background: #f8f9ff;
            border: 1px solid #e0e6ff;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }

        .widget-card h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }

        .widget-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #555;
            font-size: 13px;
        }

        .memory-chart-area {
            background: white;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #memoryGauge {
            width: 220px;
            height: 220px;
            display: block;
        }

        .memory-summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            color: #555;
            font-size: 13px;
        }

        .memory-summary strong {
            color: #333;
            font-size: 16px;
        }

        .vm-list {
            margin-top: 10px;
            border: 1px solid #eee;
            border-radius: 6px;
            background: white;
            overflow: hidden;
        }

        .vm-list-header,
        .vm-row {
            display: grid;
            grid-template-columns: 1.2fr 1fr 0.8fr 0.7fr;
            gap: 8px;
            padding: 8px 10px;
            align-items: center;
        }

        .vm-list-header {
            background: #f3f5ff;
            color: #556;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .vm-row + .vm-row {
            border-top: 1px solid #f0f2f8;
        }

        .vm-state {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .vm-state::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d14b4b;
            display: inline-block;
        }

        .vm-state.running::before {
            background: #34a853;
        }

        .vm-action-btn {
            border: none;
            background: #667eea;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal-card {
            background: white;
            border-radius: 8px;
            width: min(90%, 320px);
            padding: 16px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
        }

        .modal-card h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .modal-card p {
            font-size: 14px;
            color: #555;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .modal-card button {
            height: auto;
            padding: 8px 12px;
        }

        .output-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-bottom: 20px;
        }

        .output-section label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        #output {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            background: #f9f9f9;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
            color: #333;
        }

        #output::-webkit-scrollbar {
            width: 8px;
        }

        #output::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 5px;
        }

        #output::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 5px;
        }

        #output::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .input-section {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-section label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .input-group {
            display: flex;
            flex: 1;
            gap: 10px;
        }

        #command {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: none;
            height: 45px;
        }

        #command:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 45px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .error {
            color: #d32f2f;
        }

        .success {
            color: #388e3c;
        }

        .loading {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OpenCLAW Interface</h1>
        </div>

        <div class="content">
            <div class="widget-card">
                <h3>Proxmox Memory Usage</h3>
                <div class="widget-meta">
                    <span id="memoryTitle">Loading…</span>
                    <span id="memoryStatus">Checking connection…</span>
                </div>
                <div class="memory-chart-area">
                    <svg id="memoryGauge" viewBox="0 0 220 220" role="img" aria-label="Memory usage gauge"></svg>
                </div>
                <div class="memory-summary">
                    <span>Current</span>
                    <strong id="memoryPercent">--%</strong>
                </div>
                <div class="vm-list" id="vmListContainer">
                    <div class="vm-list-header">
                        <span>VM</span>
                        <span>Status</span>
                        <span>State</span>
                        <span>IP</span>
                    </div>
                    <div id="vmList"></div>
                </div>
            </div>

            <div class="output-section">
                <label for="output">Output</label>
                <div id="output"></div>
            </div>

            <div class="input-section">
                <div style="flex: 1;">
                    <label for="command">Command</label>
                    <div class="input-group">
                        <input
                            type="text"
                            id="command"
                            placeholder="Enter your command here..."
                            autocomplete="off"
                        />
                        <button id="sendBtn">Send</button>
                    </div>
                    <div class="status" id="status"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-backdrop" id="ipModalBackdrop">
        <div class="modal-card">
            <h4>VM IP Address</h4>
            <p id="ipModalText">No IP address available.</p>
            <button id="closeModalBtn">Close</button>
        </div>
    </div>

    <script>
        const commandInput = document.getElementById("command");
        const sendBtn = document.getElementById("sendBtn");
        const outputDiv = document.getElementById("output");
        const statusDiv = document.getElementById("status");
        const memoryTitle = document.getElementById("memoryTitle");
        const memoryStatus = document.getElementById("memoryStatus");
        const memoryPercent = document.getElementById("memoryPercent");
        const memoryGauge = document.getElementById("memoryGauge");
        const vmList = document.getElementById("vmList");
        const ipModalBackdrop = document.getElementById("ipModalBackdrop");
        const ipModalText = document.getElementById("ipModalText");
        const closeModalBtn = document.getElementById("closeModalBtn");

        // Send command on button click
        sendBtn.addEventListener("click", sendCommand);

        // Send command on Enter key
        commandInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendCommand();
            }
        });

        async function sendCommand() {
            const command = commandInput.value.trim();

            if (!command) {
                updateStatus("Please enter a command", "error");
                return;
            }

            // Disable input while sending
            sendBtn.disabled = true;
            commandInput.disabled = true;
            updateStatus("Sending command...", "loading");

            try {
                const response = await fetch("/api/command", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ command }),
                });

                const data = await response.json();

                if (response.ok) {
                    outputDiv.textContent = data.output;
                    updateStatus("Command executed successfully", "success");
                } else {
                    updateStatus(`Error: ${data.error}`, "error");
                }
            } catch (error) {
                updateStatus(`Network error: ${error.message}`, "error");
            } finally {
                // Re-enable input
                sendBtn.disabled = false;
                commandInput.disabled = false;
                commandInput.focus();
            }

            // Clear input after sending
            commandInput.value = "";
        }

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function renderMemoryGauge(percent) {
            const size = 220;
            const stroke = 22;
            const radius = (size / 2) - (stroke / 2);
            const circumference = 2 * Math.PI * radius;
            const safePercent = Math.max(0, Math.min(100, percent));
            const offset = circumference - (safePercent / 100) * circumference;

            memoryGauge.innerHTML = `
                <circle cx="${size / 2}" cy="${size / 2}" r="${radius}" fill="none" stroke="#e9ecf7" stroke-width="${stroke}"></circle>
                <circle cx="${size / 2}" cy="${size / 2}" r="${radius}" fill="none" stroke="#667eea" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" transform="rotate(-90 ${size / 2} ${size / 2})"></circle>
                <text x="${size / 2}" y="${size / 2 - 8}" text-anchor="middle" font-size="28" fill="#333" font-weight="700">${safePercent.toFixed(1)}%</text>
                <text x="${size / 2}" y="${size / 2 + 18}" text-anchor="middle" font-size="12" fill="#7b85a1">Memory Used</text>
            `;
        }

        async function loadProxmoxMemory() {
            try {
                const response = await fetch("/api/proxmox/memory");
                const data = await response.json();

                if (!response.ok) {
                    memoryTitle.textContent = "Unavailable";
                    memoryStatus.textContent = data.error || "Could not load memory data";
                    memoryPercent.textContent = "--%";
                    return;
                }

                const percent = Number(data.used_percent || 0);
                renderMemoryGauge(percent);

                memoryTitle.textContent = "Live memory usage";
                memoryStatus.textContent = `${data.used_gb} GB used of ${data.total_gb} GB`;
                memoryPercent.textContent = `${percent.toFixed(1)}%`;
            } catch (error) {
                memoryTitle.textContent = "Unavailable";
                memoryStatus.textContent = error.message;
                memoryPercent.textContent = "--%";
                renderMemoryGauge(0);
            }
        }

        function showIpModal(ipAddress) {
            ipModalText.textContent = ipAddress || "No IP address available.";
            ipModalBackdrop.classList.add("open");
        }

        function closeIpModal() {
            ipModalBackdrop.classList.remove("open");
        }

        async function loadProxmoxVms() {
            try {
                const response = await fetch("/api/proxmox/vms");
                const data = await response.json();

                if (!response.ok) {
                    vmList.innerHTML = `<div class="vm-row"><span colspan="4">${data.error || "Could not load VM list"}</span></div>`;
                    return;
                }

                if (!Array.isArray(data) || data.length === 0) {
                    vmList.innerHTML = '<div class="vm-row"><span>No VMs found</span></div>';
                    return;
                }

                vmList.innerHTML = data.map((vm) => `
                    <div class="vm-row">
                        <span>${vm.name}</span>
                        <span>${vm.status}</span>
                        <span class="vm-state ${vm.is_running ? "running" : ""}">${vm.is_running ? "On" : "Off"}</span>
                        <button class="vm-action-btn" data-ip="${vm.ip_address || ""}">Show IP</button>
                    </div>
                `).join("");

                vmList.querySelectorAll(".vm-action-btn").forEach((button) => {
                    button.addEventListener("click", () => showIpModal(button.getAttribute("data-ip")));
                });
            } catch (error) {
                vmList.innerHTML = `<div class="vm-row"><span>${error.message}</span></div>`;
            }
        }

        closeModalBtn.addEventListener("click", closeIpModal);
        ipModalBackdrop.addEventListener("click", (event) => {
            if (event.target === ipModalBackdrop) {
                closeIpModal();
            }
        });

        // Focus on input when page loads
        commandInput.focus();
        renderMemoryGauge(0);
        loadProxmoxMemory();
        loadProxmoxVms();
        setInterval(loadProxmoxMemory, 10000);
        setInterval(loadProxmoxVms, 15000);
    </script>
</body>
</html>
