<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCLAW Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
        }

        .content {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 20px;
            overflow: hidden;
        }

        .widget-card {
            background: #f8f9ff;
            border: 1px solid #e0e6ff;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }

        .widget-card h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #333;
        }

        .widget-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #555;
            font-size: 13px;
        }

        .memory-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 999px;
            overflow: hidden;
        }

        .memory-bar > div {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .memory-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .memory-metric {
            background: white;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }

        .memory-metric span {
            display: block;
            font-size: 11px;
            color: #777;
            margin-bottom: 4px;
        }

        .memory-metric strong {
            color: #333;
            font-size: 14px;
        }

        .output-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-bottom: 20px;
        }

        .output-section label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        #output {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            background: #f9f9f9;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
            color: #333;
        }

        #output::-webkit-scrollbar {
            width: 8px;
        }

        #output::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 5px;
        }

        #output::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 5px;
        }

        #output::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .input-section {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-section label {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .input-group {
            display: flex;
            flex: 1;
            gap: 10px;
        }

        #command {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: none;
            height: 45px;
        }

        #command:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            height: 45px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .error {
            color: #d32f2f;
        }

        .success {
            color: #388e3c;
        }

        .loading {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OpenCLAW Interface</h1>
        </div>

        <div class="content">
            <div class="widget-card">
                <h3>Proxmox Memory Usage</h3>
                <div class="widget-meta">
                    <span id="memoryTitle">Loading…</span>
                    <span id="memoryStatus">Checking connection…</span>
                </div>
                <div class="memory-metrics">
                    <div class="memory-metric">
                        <span>Used</span>
                        <strong id="memoryUsed">-- GB</strong>
                    </div>
                    <div class="memory-metric">
                        <span>Free</span>
                        <strong id="memoryFree">-- GB</strong>
                    </div>
                    <div class="memory-metric">
                        <span>Percent</span>
                        <strong id="memoryPercent">--%</strong>
                    </div>
                </div>
                <div class="memory-bar"><div id="memoryBarFill"></div></div>
            </div>

            <div class="output-section">
                <label for="output">Output</label>
                <div id="output"></div>
            </div>

            <div class="input-section">
                <div style="flex: 1;">
                    <label for="command">Command</label>
                    <div class="input-group">
                        <input
                            type="text"
                            id="command"
                            placeholder="Enter your command here..."
                            autocomplete="off"
                        />
                        <button id="sendBtn">Send</button>
                    </div>
                    <div class="status" id="status"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const commandInput = document.getElementById("command");
        const sendBtn = document.getElementById("sendBtn");
        const outputDiv = document.getElementById("output");
        const statusDiv = document.getElementById("status");
        const memoryTitle = document.getElementById("memoryTitle");
        const memoryStatus = document.getElementById("memoryStatus");
        const memoryUsed = document.getElementById("memoryUsed");
        const memoryFree = document.getElementById("memoryFree");
        const memoryPercent = document.getElementById("memoryPercent");
        const memoryBarFill = document.getElementById("memoryBarFill");

        // Send command on button click
        sendBtn.addEventListener("click", sendCommand);

        // Send command on Enter key
        commandInput.addEventListener("keypress", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendCommand();
            }
        });

        async function sendCommand() {
            const command = commandInput.value.trim();

            if (!command) {
                updateStatus("Please enter a command", "error");
                return;
            }

            // Disable input while sending
            sendBtn.disabled = true;
            commandInput.disabled = true;
            updateStatus("Sending command...", "loading");

            try {
                const response = await fetch("/api/command", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ command }),
                });

                const data = await response.json();

                if (response.ok) {
                    outputDiv.textContent = data.output;
                    updateStatus("Command executed successfully", "success");
                } else {
                    updateStatus(`Error: ${data.error}`, "error");
                }
            } catch (error) {
                updateStatus(`Network error: ${error.message}`, "error");
            } finally {
                // Re-enable input
                sendBtn.disabled = false;
                commandInput.disabled = false;
                commandInput.focus();
            }

            // Clear input after sending
            commandInput.value = "";
        }

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        async function loadProxmoxMemory() {
            try {
                const response = await fetch("/api/proxmox/memory");
                const data = await response.json();

                if (!response.ok) {
                    memoryTitle.textContent = "Unavailable";
                    memoryStatus.textContent = data.error || "Could not load memory data";
                    memoryUsed.textContent = "-- GB";
                    memoryFree.textContent = "-- GB";
                    memoryPercent.textContent = "--%";
                    memoryBarFill.style.width = "0%";
                    return;
                }

                memoryTitle.textContent = "Current host memory";
                memoryStatus.textContent = `${data.used_gb} GB used of ${data.total_gb} GB`;
                memoryUsed.textContent = `${data.used_gb} GB`;
                memoryFree.textContent = `${data.free_gb} GB`;
                memoryPercent.textContent = `${data.used_percent}%`;
                memoryBarFill.style.width = `${Math.min(data.used_percent, 100)}%`;
            } catch (error) {
                memoryTitle.textContent = "Unavailable";
                memoryStatus.textContent = error.message;
                memoryUsed.textContent = "-- GB";
                memoryFree.textContent = "-- GB";
                memoryPercent.textContent = "--%";
                memoryBarFill.style.width = "0%";
            }
        }

        // Focus on input when page loads
        commandInput.focus();
        loadProxmoxMemory();
        setInterval(loadProxmoxMemory, 30000);
    </script>
</body>
</html>
